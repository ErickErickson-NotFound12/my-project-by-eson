<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Customizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* Character */
#white4 {color: black; font-weight: 900;  font-size: 30px;}
#blue4 {color: rgb(255, 239, 192); font-weight: 900; font-size: 30px;}
#black4 {color: white; font-weight: 900; font-size: 30px;}

.button10 {background-color: #ffffff;}
.button11 {background-color: #192d59;}
.button12 {background-color: black;}

/* Barong */
#white {color: black; font-weight: 900;  font-size: 30px;}
#blue {color: rgb(255, 239, 192); font-weight: 900;  font-size: 30px;}
#black {color: white; font-weight: 900; font-size: 30px;} 

.button1 {background-color: #ffffff;}
.button2 {background-color: #192d59;}
.button3 {background-color: black;}

/* Shoes */
#white2 {color: black; font-weight: 900; font-size: 30px;}
#blue2 {color: rgb(255, 239, 192); font-weight: 900; font-size: 30px;}
#black2 {color: white; font-weight: 900; font-size: 30px;} 

.button4 {background-color: #ffffff;}
.button5 {background-color: #192d59;}
.button6 {background-color: black;}

/* Ribbon */
#white3 {color: black; font-weight: 900; font-size: 30px;}
#blue3 {color: rgb(255, 239, 192); font-weight: 900; font-size: 30px;}
#black3 {color: white; font-weight: 900; font-size: 30px;}

.button7 {background-color: #ffffff;}
.button8 {background-color: #192d59;}
.button9 {background-color: black;}

.container {
    display: flex;
    height: 100vh;
}

/* Left Side and Character */
.preview {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, blue, rgb(194, 194, 255));;
}

.character {
    position: relative;
    top: -240px;
    width: 500px;
    height: 600px;
}

.layer {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
}
.oval {
  height: 200px;
  width: 300px;
  background-color: rgba(44, 44, 98, 0.648);
  border-radius: 50%;
  transform: translate(-735px, 920px);
}

/* Layer order */
#fullbody { z-index: 1; }
#barong { z-index: 2; }
#shoes { z-index: 3; }
#ribbon { z-index: 4; }

/* Right Side and Buttons choices */
.options {
    flex: 1;
    padding: 60px;
    background:rgb(255, 255, 255);
}

button {
    margin: 5px;
    padding: 30px;
    cursor: pointer;
    border: none;
    border-radius: 50%;
}

button:hover {
    background: #929292;
}
</style>
</head>

<body>

<div class="container">

<!-- Character -->
<div class="preview">
    <div class="character">
        <!-- Images -->
         <img id="fullbody" src="assets/Whole.png" class="layer">
        <img id="barong" src="assets/WhiteBarong.png" class="layer">
        <img id="shoes" src="assets/WhiteShoes.png" class="layer">
        <img id="ribbon" src="assets/WhiteRibbon.png" class="layer">
    </div>
</div>

<!-- Options -->
<div class="options">
    <div class="oval"></div>

    <h3>Character</h3>
    <button onclick="changeFullbody('Whole')" button class="button button10" id="white4">Jessica</button>
    <button onclick="changeFullbody('Whole2')" button class="button button11" id="blue4">Emilia</button>
    <button onclick="changeFullbody('Whole3')" button class="button button12" id="black4">Jenny</button>

    <h3>Barong</h3>
    <button onclick="changeBarong('WhiteBarong')" button class="button button1" id="white">White</button>
    <button onclick="changeBarong('BlueBarong')" button class="button button2" id="blue">Blue</button>
    <button onclick="changeBarong('BlackBarong')" button class="button button3" id="black">Black</button>

    <h3>Shoes</h3>
    <button onclick="changeShoes('WhiteShoes')" button class="button button4" id="white2">White</button>
    <button onclick="changeShoes('BlueShoes')" button class="button button5" id="blue2">Blue</button>
    <button onclick="changeShoes('BlackShoes')" button class="button button6" id="black2">Black</button>

    <h3>Ribbon</h3>
    <button onclick="changeRibbon('WhiteRibbon')" button class="button button7" id="white3">White</button>
    <button onclick="changeRibbon('BlueRibbon')"button class="button button8" id="blue3">Blue</button>
    <button onclick="changeRibbon('BlackRibbon')"button class="button button9" id="black3">Black</button>

</div>

</div>

<script>
function animatePart(target) {
    anime({
        targets: target,
        scale: [1, 1.05, 1],
        duration: 300,
        easing: 'easeInOutQuad'
    });
}

function changeFullbody(type) {
    const el = document.getElementById('fullbody');
    el.src = "assets/" + type + ".png";
    animatePart(el);
}

function changeBarong(type) {
    const el = document.getElementById('barong');
    el.src = "assets/" + type + ".png";
    animatePart(el);
}

function changeShoes(type) {
    const el = document.getElementById('shoes');
    el.src = "assets/" + type + ".png";
    animatePart(el);
}

function changeRibbon(type) {
    const el = document.getElementById('ribbon');
    el.src = "assets/" + type + ".png";
    animatePart(el);
}
</script>

</body>
</html>
